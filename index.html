<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قاموس STEP & ALCPT</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#eef2ff,#f8fafc);
    font-family: Arial;
}

.card{
    border:none;
    border-radius:16px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.header{
    background:#0d6efd;
    color:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.stat{
    font-size:24px;
    font-weight:bold;
}

table{
    border-radius:10px;
    overflow:hidden;
}

thead{
    background:#0d6efd;
    color:white;
}

.btn{
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container py-4">

<div class="header mb-4">
<h2>📚 قاموس STEP & ALCPT</h2>
</div>

<!-- INPUT -->
<div class="card p-3 mb-3">

<div class="row g-2">

<div class="col-md-3">
<input id="word" class="form-control" placeholder="Word">
</div>

<div class="col-md-3">
<input id="meaning" class="form-control" placeholder="Meaning">
</div>

<div class="col-md-4">
<input id="sentence" class="form-control" placeholder="Sentence">
</div>

<div class="col-md-2">
<select id="category" class="form-select">
<option value="STEP">STEP</option>
<option value="ALCPT">ALCPT</option>
</select>
</div>

</div>

<button class="btn btn-primary w-100 mt-2" onclick="addWord()">
إضافة كلمة
</button>

</div>

<!-- SEARCH -->
<div class="card p-3 mb-3">

<div class="row g-2">

<div class="col-md-6">
<input id="search" class="form-control" placeholder="بحث..." onkeyup="render()">
</div>

<div class="col-md-3">
<select id="filter" class="form-select" onchange="render()">
<option value="ALL">كل التصنيفات</option>
<option value="STEP">STEP</option>
<option value="ALCPT">ALCPT</option>
</select>
</div>

<div class="col-md-3">
<button class="btn btn-success w-100" onclick="exportData()">تصدير</button>
</div>

</div>

</div>

<!-- TABLE -->
<div class="card p-3">

<table class="table table-hover">
<thead>
<tr>
<th>#</th>
<th>Word</th>
<th>Meaning</th>
<th>Sentence</th>
<th>Type</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

</div>

<script>

<!-- ✅ IMPORTANT: LOAD DATA FROM LOCAL STORAGE -->
let words = JSON.parse(localStorage.getItem("wordsDB")) || [];

function saveData(){
    localStorage.setItem("wordsDB", JSON.stringify(words));
}

function addWord(){

let word = document.getElementById("word").value.trim();
let meaning = document.getElementById("meaning").value.trim();
let sentence = document.getElementById("sentence").value.trim();
let category = document.getElementById("category").value;

if(!word || !meaning){
alert("أدخل الكلمة والمعنى");
return;
}

words.push({
id: Date.now(),
word,
meaning,
sentence,
category
});

saveData(); // ✅ حفظ دائم

clearInputs();
render();
}

function clearInputs(){
document.getElementById("word").value="";
document.getElementById("meaning").value="";
document.getElementById("sentence").value="";
}

function render(){

let search = document.getElementById("search").value.toLowerCase();
let filter = document.getElementById("filter").value;

let filtered = words.filter(w=>{
return w.word.toLowerCase().includes(search) &&
(filter==="ALL" || w.category===filter);
});

let html="";

filtered.forEach((w,i)=>{

html += `
<tr>
<td>${i+1}</td>
<td>${w.word}</td>
<td>${w.meaning}</td>
<td>${w.sentence}</td>
<td>${w.category}</td>
<td>
<button class="btn btn-danger btn-sm" onclick="deleteWord(${w.id})">حذف</button>
</td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML = html;
}

function deleteWord(id){

words = words.filter(w=>w.id !== id);

saveData(); // ✅ حفظ بعد الحذف

render();
}

function exportData(){

let blob = new Blob([JSON.stringify(words,null,2)], {type:"application/json"});
let a = document.createElement("a");

a.href = URL.createObjectURL(blob);
a.download = "dictionary.json";
a.click();
}

render();

</script>

</body>
</html>
