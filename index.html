<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قاموس STEP & ALCPT</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#eef2ff,#f8fafc);
    font-family: Arial;
}

/* Header */
.header{
    background: rgba(13,110,253,0.9);
    color:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* Cards */
.card{
    border: none;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    backdrop-filter: blur(6px);
}

/* Stats */
.stat{
    font-size:26px;
    font-weight:bold;
}

/* Inputs */
input, select{
    border-radius:12px !important;
    padding:10px !important;
}

/* Buttons */
.btn{
    border-radius:12px;
}

/* Table */
table{
    border-radius:12px;
    overflow:hidden;
}

thead{
    background:#0d6efd;
    color:white;
}

tbody tr:hover{
    background:#f1f5ff;
}

/* Badges */
.badge-step{
    background:#0d6efd;
    padding:6px 10px;
    border-radius:10px;
}

.badge-alcpt{
    background:#198754;
    padding:6px 10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container py-4">

<!-- HEADER -->
<div class="header text-center mb-4">
<h2>📚 قاموس الكلمات الذكي</h2>
<p>STEP & ALCPT Vocabulary App</p>
</div>

<!-- STATS -->
<div class="row mb-4">

<div class="col-md-4 mb-3">
<div class="card p-3 text-center">
<div class="stat text-primary" id="totalWords">0</div>
<div>إجمالي الكلمات</div>
</div>
</div>

<div class="col-md-4 mb-3">
<div class="card p-3 text-center">
<div class="stat text-primary" id="stepCount">0</div>
<div>STEP</div>
</div>
</div>

<div class="col-md-4 mb-3">
<div class="card p-3 text-center">
<div class="stat text-success" id="alcptCount">0</div>
<div>ALCPT</div>
</div>
</div>

</div>

<!-- ADD -->
<div class="card p-4 mb-4">

<h5 class="mb-3">➕ إضافة كلمة جديدة</h5>

<div class="row g-3">

<div class="col-md-3">
<input id="word" class="form-control" placeholder="Word">
</div>

<div class="col-md-3">
<input id="meaning" class="form-control" placeholder="المعنى">
</div>

<div class="col-md-4">
<input id="sentence" class="form-control" placeholder="Example Sentence">
</div>

<div class="col-md-2">
<select id="category" class="form-select">
<option value="STEP">STEP</option>
<option value="ALCPT">ALCPT</option>
</select>
</div>

<div class="col-12">
<button class="btn btn-primary w-100" onclick="addWord()">
حفظ الكلمة
</button>
</div>

</div>

</div>

<!-- SEARCH -->
<div class="card p-3 mb-4">

<div class="row g-2">

<div class="col-md-6">
<input id="search" class="form-control" placeholder="🔎 بحث..." onkeyup="renderTable()">
</div>

<div class="col-md-3">
<select id="filter" class="form-select" onchange="renderTable()">
<option value="ALL">كل التصنيفات</option>
<option value="STEP">STEP</option>
<option value="ALCPT">ALCPT</option>
</select>
</div>

<div class="col-md-3">
<button class="btn btn-success w-100" onclick="exportData()">
⬇ تصدير
</button>
</div>

</div>

</div>

<!-- TABLE -->
<div class="card p-3">

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead>
<tr>
<th>#</th>
<th>Word</th>
<th>Meaning</th>
<th>Sentence</th>
<th>Type</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

</div>

<script>

let words = JSON.parse(localStorage.getItem("wordsDB")) || [];

function save(){
localStorage.setItem("wordsDB", JSON.stringify(words));
}

function addWord(){

let word = document.getElementById("word").value.trim();
let meaning = document.getElementById("meaning").value.trim();
let sentence = document.getElementById("sentence").value.trim();
let category = document.getElementById("category").value;

if(!word || !meaning){
alert("أدخل كلمة ومعنى");
return;
}

words.push({
id:Date.now(),
word,
meaning,
sentence,
category
});

save();
clearInputs();
renderTable();
}

function clearInputs(){
document.getElementById("word").value="";
document.getElementById("meaning").value="";
document.getElementById("sentence").value="";
}

function renderTable(){

let search = document.getElementById("search").value.toLowerCase();
let filter = document.getElementById("filter").value;

let filtered = words.filter(w=>{
return w.word.toLowerCase().includes(search) &&
(filter==="ALL" || w.category===filter);
});

let html="";

filtered.forEach((w,i)=>{

html += `
<tr>
<td>${i+1}</td>
<td>${w.word}</td>
<td>${w.meaning}</td>
<td>${w.sentence}</td>
<td>
<span class="${w.category==='STEP'?'badge-step':'badge-alcpt'}">
${w.category}
</span>
</td>
<td>
<button class="btn btn-warning btn-sm" onclick="editWord(${w.id})">✏</button>
<button class="btn btn-danger btn-sm" onclick="deleteWord(${w.id})">🗑</button>
</td>
</tr>
`;
});

document.getElementById("tableBody").innerHTML = html;

updateStats();
}

function deleteWord(id){
words = words.filter(w=>w.id!==id);
save();
renderTable();
}

function editWord(id){

let w = words.find(x=>x.id===id);

let newWord = prompt("Word", w.word);
if(newWord===null) return;

let newMeaning = prompt("Meaning", w.meaning);
let newSentence = prompt("Sentence", w.sentence);

w.word = newWord;
w.meaning = newMeaning;
w.sentence = newSentence;

save();
renderTable();
}

function updateStats(){

document.getElementById("totalWords").innerText = words.length;
document.getElementById("stepCount").innerText = words.filter(w=>w.category==="STEP").length;
document.getElementById("alcptCount").innerText = words.filter(w=>w.category==="ALCPT").length;

}

function exportData(){

let blob = new Blob([JSON.stringify(words,null,2)], {type:"application/json"});
let a = document.createElement("a");

a.href = URL.createObjectURL(blob);
a.download = "dictionary.json";
a.click();
}

renderTable();

</script>

</body>
</html>
